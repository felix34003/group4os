<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FelixOS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #eee;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 16px;
        }

        h1 { font-size: 1.1rem; color: #0cf; letter-spacing: 2px; }

        #video-feed {
            width: 100%;
            max-width: 800px;
            border: 1px solid #333;
            background: #000;
            display: block;
        }

        #stats {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px 16px;
            min-width: 140px;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            color: #0cf;
        }

        .offline { color: #f55; }
    </style>
</head>
<body>
    <h1>FELIXOS</h1>

    <img id="video-feed" src="/video_feed" alt="No video">

    <div id="stats">
        <div class="stat">
            <div class="stat-label">Step Counter</div>
            <div class="stat-value" id="counter">--</div>
        </div>
        <!-- Additional stat cards are injected here by JS as nodes report in -->
    </div>

    <script>
        const statsEl = document.getElementById('stats');
        const knownStats = {};

        function ensureStat(id, label) {
            if (!knownStats[id]) {
                const card = document.createElement('div');
                card.className = 'stat';
                card.innerHTML = `<div class="stat-label">${label}</div>
                                  <div class="stat-value" id="stat-${id}">--</div>`;
                statsEl.appendChild(card);
                knownStats[id] = true;
            }
            return document.getElementById(`stat-${id}`);
        }

        async function update() {
            try {
                const data = await fetch('/stats').then(r => r.json());

                // Step counter from Pi heartbeat
                if (data.Pi) {
                    document.getElementById('counter').textContent = data.Pi.last_counter ?? '--';
                }

                // One card per reporting node, per metric
                for (const [node, s] of Object.entries(data)) {
                    ensureStat(`${node}-cpu`,  `${node} CPU`).textContent  = s.cpu_percent  + '%';
                    ensureStat(`${node}-mem`,  `${node} MEM`).textContent  = s.memory_percent + '%';
                    if (s.temp) {
                        ensureStat(`${node}-temp`, `${node} Temp`).textContent = s.temp + '°C';
                    }
                }
            } catch (_) {}
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
